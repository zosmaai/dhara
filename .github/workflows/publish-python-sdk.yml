name: PyPI Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dhara-extension-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Inject version from release tag
        env:
          TAG: ${{ github.ref_name }}
        run: python3 scripts/inject-version.py

      - name: Install build tools
        run: pip install build twine
      - name: Build package
        run: python3 -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

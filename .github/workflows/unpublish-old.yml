name: Unpublish Old Extension

on:
  workflow_dispatch:

jobs:
  unpublish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Unpublish zosmaai.dhara
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [ -z "$VSCE_TOKEN" ]; then
            echo "VSCE_TOKEN not set"
            exit 1
          fi
          npx @vscode/vsce unpublish zosmaai.dhara -p "$VSCE_TOKEN" --force
